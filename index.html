<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Daguerre</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: url('ar-bg.png') center / cover no-repeat;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    /* Three.js appends its <canvas> — keep it behind DOM overlays */
    canvas {
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── AR overlay (visible during the XR session) ──────────────────── */
    #ar-ui {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: calc(32px + env(safe-area-inset-bottom));
      pointer-events: none;
    }

    #scan-hint {
      color: rgba(255, 255, 255, 0.9);
      font-size: clamp(14px, 3.5vw, 17px);
      font-weight: 500;
      margin-bottom: 18px;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.7);
      text-align: center;
      padding: 0 24px;
    }

    /* Helper text shown after video ends */
    .daguerre-helper-text {
      position: fixed;
      left: 50%;
      bottom: calc(96px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 19;
      max-width: calc(100vw - 40px);
      padding: 10px 14px;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.35;
      text-align: center;
      color: rgba(255, 255, 255, 0.96);
      background: rgba(8, 18, 32, 0.58);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
      pointer-events: none;
    }

    /* ── Landing screen ──────────────────────────────────────────────── */
    #start-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.75);
      z-index: 10;
    }

    /* ── Shared button style ─────────────────────────────────────────── */
    .ar-cta-button {
      display: inline-block;
      min-height: 56px;
      min-width: 280px;
      max-width: calc(100vw - 32px);
      padding: 16px 24px;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 17px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: 0.015em;
      text-align: center;
      white-space: nowrap;
      color: #ffffff;
      background: linear-gradient(135deg, #165dff 0%, #00b8d9 100%);
      border: 1px solid rgba(255, 255, 255, 0.36);
      border-radius: 18px;
      box-shadow:
        0 14px 32px rgba(0, 118, 255, 0.32),
        inset 0 1px 0 rgba(255, 255, 255, 0.28);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      pointer-events: auto;
      transition: transform 160ms ease, box-shadow 160ms ease,
                  filter 160ms ease, opacity 160ms ease;
    }

    .ar-cta-button:active {
      transform: translateY(1px);
      filter: brightness(0.96);
      box-shadow:
        0 8px 18px rgba(0, 118, 255, 0.26),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .ar-cta-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }

    @media (max-width: 360px) {
      .ar-cta-button {
        min-width: auto;
        width: calc(100vw - 32px);
        font-size: 16px;
        white-space: normal;
      }
    }

    #errMsg {
      color: #f77;
      font-size: 14px;
      margin-top: 16px;
      display: none;
      text-align: center;
      max-width: 300px;
      padding: 0 16px;
    }

    /* ── Loading overlay ─────────────────────────────────────────────── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.62);
      z-index: 45;
    }

    #loading-text {
      color: rgba(255, 255, 255, 0.9);
      font-family: "Inter", system-ui, sans-serif;
      font-size: 16px;
      font-weight: 500;
      text-align: center;
      letter-spacing: 0.01em;
    }

    /* ── Result overlay ──────────────────────────────────────────────── */
    #result-overlay {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      background: #000;
      z-index: 50;
    }

    #result-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #result-actions {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding-bottom: calc(32px + env(safe-area-inset-bottom));
      width: 100%;
    }

    #resumeBtn {
      color: rgba(255, 255, 255, 0.75);
      font-family: "Inter", system-ui, sans-serif;
      font-size: 15px;
      font-weight: 500;
      background: none;
      border: none;
      cursor: pointer;
      pointer-events: auto;
      padding: 8px 20px;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

<!-- Character video — no loop; plays once, holds the last frame -->
<video id="charVideo" src="daguerre.mp4" muted playsinline
  style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"></video>

<!-- DOM overlay shown during the AR session -->
<div id="ar-ui">
  <!-- Phase 1: scanning + placement -->
  <p id="scan-hint">Pointez vers le sol</p>
  <button id="placeBtn" class="ar-cta-button" disabled>Placer Louis Daguerre ici</button>

  <!-- Phase 2: after video ends — helper text uses its own fixed position -->
  <p id="helperText" class="daguerre-helper-text" style="display:none">
    Ajoutez une personne à la scène ou capturez simplement Louis Daguerre.
  </p>
  <button id="createBtn" class="ar-cta-button" style="display:none">
    Créer un daguerréotype
  </button>

  <!-- Processing state — inside the DOM overlay root so the XR compositor shows it -->
  <div id="loading-overlay">
    <p id="loading-text">Création du daguerréotype...</p>
  </div>

  <!-- Result screen — inside the DOM overlay root for the same reason -->
  <div id="result-overlay">
    <img id="result-img" alt="" />
    <div id="result-actions">
      <button id="saveBtn" class="ar-cta-button">Enregistrer l'image</button>
      <button id="resumeBtn">Reprendre</button>
    </div>
  </div>
</div>

<!-- Landing screen -->
<div id="start-overlay">
  <button id="startBtn" class="ar-cta-button">Rencontrer Louis Daguerre</button>
  <div id="errMsg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>

// ─── Scene ───────────────────────────────────────────────────────────────────

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Reticle ─────────────────────────────────────────────────────────────────

const reticle = new THREE.Mesh(
  new THREE.RingGeometry(0.10, 0.13, 32).rotateX(-Math.PI / 2),
  new THREE.MeshBasicMaterial({ color: 0x50d2ff, side: THREE.DoubleSide })
);
reticle.matrixAutoUpdate = false;
reticle.visible = false;
scene.add(reticle);

// ─── Daguerre character ───────────────────────────────────────────────────────

const charVideo = document.getElementById('charVideo');
const DAGUERRE_HEIGHT = 1.72; // metres

const videoTex = new THREE.VideoTexture(charVideo);
videoTex.minFilter = THREE.LinearFilter;
videoTex.magFilter = THREE.LinearFilter;

const daguerreMat = new THREE.ShaderMaterial({
  uniforms: { uTex: { value: videoTex } },
  vertexShader: `
    varying vec2 vUV;
    void main() {
      vUV = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    precision mediump float;
    uniform sampler2D uTex;
    varying vec2 vUV;
    void main() {
      vec4 c      = texture2D(uTex, vUV);
      float green = c.g - max(c.r, c.b);
      float a     = 1.0 - smoothstep(0.01, 0.2, green);
      float spill = max(0.0, green);
      gl_FragColor = vec4(c.r, c.g - spill, c.b, a);
    }
  `,
  transparent: true,
  side: THREE.FrontSide,
  depthWrite: false,
});

let daguerreMesh   = null;
let daguerrePlaced = false;

function buildDaguerreMesh() {
  if (daguerreMesh) return;
  const vw     = charVideo.videoWidth  || 9;
  const vh     = charVideo.videoHeight || 16;
  const planeW = DAGUERRE_HEIGHT * (vw / vh);
  daguerreMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(planeW, DAGUERRE_HEIGHT),
    daguerreMat
  );
  daguerreMesh.matrixAutoUpdate = false;
}

charVideo.addEventListener('loadedmetadata', buildDaguerreMesh);
if (charVideo.readyState >= 1) buildDaguerreMesh();

// When the video ends: hold the last frame, reveal the daguerreotype CTA
charVideo.addEventListener('ended', () => {
  helperText.style.display = 'block';
  createBtn.style.display  = 'block';
});

// ─── Placement ────────────────────────────────────────────────────────────────

function placeDaguerre() {
  if (!reticle.visible || daguerrePlaced) return;
  daguerrePlaced = true;

  buildDaguerreMesh();

  const hitPos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
  const cam    = camera.position;
  const theta  = Math.atan2(cam.x - hitPos.x, cam.z - hitPos.z);

  daguerreMesh.matrix
    .makeRotationY(theta)
    .setPosition(hitPos.x, hitPos.y + DAGUERRE_HEIGHT / 2, hitPos.z);

  scene.add(daguerreMesh);

  reticle.visible        = false;
  placeBtn.style.display = 'none';
  scanHint.style.display = 'none';

  charVideo.play().catch(() => {});
}

// ─── UI references ────────────────────────────────────────────────────────────

const startOverlay   = document.getElementById('start-overlay');
const arUI           = document.getElementById('ar-ui');
const scanHint       = document.getElementById('scan-hint');
const placeBtn       = document.getElementById('placeBtn');
const helperText     = document.getElementById('helperText');
const createBtn      = document.getElementById('createBtn');
const errMsg         = document.getElementById('errMsg');
const loadingOverlay = document.getElementById('loading-overlay');
const resultOverlay  = document.getElementById('result-overlay');
const resultImg      = document.getElementById('result-img');
const saveBtn        = document.getElementById('saveBtn');
const resumeBtn      = document.getElementById('resumeBtn');

placeBtn.addEventListener('click', () => {
  charVideo.play().catch(() => {});
  placeDaguerre();
});

// ─── Capture + daguerreotype filter ──────────────────────────────────────────

let captureNextFrame  = false;
let processingCapture = false;
let savedDataURL      = null;

// XRWebGLBinding gives access to the same camera texture WebXR composites.
// Created once the XR session starts; null when no session is active.
let xrBinding = null;

createBtn.addEventListener('click', () => {
  if (processingCapture) return;
  processingCapture       = true;
  createBtn.disabled      = true;
  loadingOverlay.style.display = 'flex';
  captureNextFrame = true;
});

saveBtn.addEventListener('click', () => {
  if (!savedDataURL) return;
  const a      = document.createElement('a');
  a.href       = savedDataURL;
  a.download   = 'daguerreotype.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
});

resumeBtn.addEventListener('click', () => {
  resultOverlay.style.display = 'none';
  createBtn.disabled          = false;
  processingCapture           = false;
});

function loadImage(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.src = src;
  });
}

async function processDaguerreotype(dataURL) {
  const img = await loadImage(dataURL);

  const offscreen = document.createElement('canvas');
  offscreen.width  = img.width;
  offscreen.height = img.height;
  const c = offscreen.getContext('2d');
  const w = offscreen.width;
  const h = offscreen.height;

  // Dark silver-plate background fills any transparent areas
  c.fillStyle = '#080a10';
  c.fillRect(0, 0, w, h);
  c.drawImage(img, 0, 0);

  // ── Pixel pass: grayscale → contrast → grain → silver-blue tint ─────────
  const imgData = c.getImageData(0, 0, w, h);
  const d = imgData.data;

  for (let i = 0; i < d.length; i += 4) {
    // Luminance grayscale
    let lum = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];

    // Contrast (pivoted at 128 to keep midtones)
    lum = (lum - 128) * 1.18 + 128;

    // Fine grain (±7 noise per spec)
    lum += (Math.random() - 0.5) * 14;
    lum  = Math.max(0, Math.min(255, lum));

    // Silver-blue tint
    d[i]     = Math.min(255, lum * 0.92 | 0); // r — slightly cooler
    d[i + 1] = Math.min(255, lum * 0.96 | 0); // g
    d[i + 2] = Math.min(255, lum * 1.05 | 0); // b — blue-silver cast
    d[i + 3] = 255;
  }
  c.putImageData(imgData, 0, 0);

  // ── Vignette ──────────────────────────────────────────────────────────────
  const cx   = w / 2;
  const cy   = h / 2;
  const maxR = Math.sqrt(cx * cx + cy * cy);
  const vig  = c.createRadialGradient(cx, cy, maxR * 0.28, cx, cy, maxR);
  vig.addColorStop(0,    'rgba(0,0,0,0)');
  vig.addColorStop(0.65, 'rgba(0,0,0,0.08)');
  vig.addColorStop(1,    'rgba(0,0,0,0.45)');
  c.fillStyle = vig;
  c.fillRect(0, 0, w, h);

  // ── Centre highlight glow ─────────────────────────────────────────────────
  const glow = c.createRadialGradient(cx, cy * 0.9, 0, cx, cy, maxR * 0.8);
  glow.addColorStop(0, 'rgba(210,225,255,0.06)');
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  c.fillStyle = glow;
  c.fillRect(0, 0, w, h);

  // ── Plate imperfections ───────────────────────────────────────────────────
  c.save();

  // Subtle vertical scratches
  const nScratch = 4 + (Math.random() * 5 | 0);
  for (let s = 0; s < nScratch; s++) {
    const sx  = Math.random() * w;
    const sy  = Math.random() * h * 0.5;
    const ey  = sy + h * (0.15 + Math.random() * 0.55);
    const off = () => (Math.random() - 0.5);
    c.beginPath();
    c.moveTo(sx, sy);
    c.bezierCurveTo(
      sx + off() * 5, sy + (ey - sy) * 0.33,
      sx + off() * 5, sy + (ey - sy) * 0.66,
      sx + off() * 8, ey
    );
    c.strokeStyle = `rgba(255,255,255,${(0.05 + Math.random() * 0.04).toFixed(3)})`;
    c.lineWidth   = 0.4 + Math.random() * 0.7;
    c.stroke();
  }

  // Dust marks
  const nDust = 10 + (Math.random() * 12 | 0);
  for (let k = 0; k < nDust; k++) {
    c.beginPath();
    c.arc(Math.random() * w, Math.random() * h, 0.5 + Math.random() * 2.5, 0, Math.PI * 2);
    c.fillStyle = `rgba(0,0,0,${(0.04 + Math.random() * 0.04).toFixed(3)})`;
    c.fill();
  }
  c.restore();

  savedDataURL = offscreen.toDataURL('image/png');
  loadingOverlay.style.display = 'none';
  resultImg.src = savedDataURL;
  resultOverlay.style.display = 'flex';
}

function showError(msg) {
  errMsg.textContent   = msg;
  errMsg.style.display = 'block';
}

// ─── WebXR session ────────────────────────────────────────────────────────────

let hitTestSource          = null;
let hitTestSourceRequested = false;

document.getElementById('startBtn').addEventListener('click', startAR);

async function startAR() {
  if (!navigator.xr) {
    showError('WebXR non disponible. Essayez Chrome sur Android.');
    return;
  }
  const supported = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
  if (!supported) {
    showError('RA non supportee sur cet appareil ou navigateur.');
    return;
  }

  try {
    const session = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay', 'camera-access'],
      domOverlay: { root: arUI },
    });

    renderer.xr.setReferenceSpaceType('local');
    await renderer.xr.setSession(session); // makes the GL context XR-compatible

    // XRWebGLBinding uses the same GL context Three.js uses for XR, giving us
    // getCameraImage() — the exact texture the compositor is showing.
    if (session.enabledFeatures?.includes('camera-access')) {
      xrBinding = new XRWebGLBinding(session, renderer.getContext());
    }

    renderer.setAnimationLoop(onXRFrame);

    startOverlay.style.display = 'none';
    arUI.style.display         = 'flex';

    session.addEventListener('end', onSessionEnd);
  } catch (e) {
    showError('Impossible de demarrer la RA : ' + e.message);
  }
}

function onSessionEnd() {
  xrBinding = null;
  if (daguerreMesh) scene.remove(daguerreMesh);
  daguerreMesh           = null;
  daguerrePlaced         = false;
  hitTestSource          = null;
  hitTestSourceRequested = false;
  reticle.visible        = false;
  captureNextFrame       = false;
  processingCapture      = false;

  renderer.setAnimationLoop(null);

  // Reset all overlays
  startOverlay.style.display   = 'flex';
  arUI.style.display           = 'none';
  loadingOverlay.style.display = 'none';
  resultOverlay.style.display  = 'none';

  // Reset AR-ui children to initial state
  placeBtn.style.display   = 'block';
  placeBtn.disabled        = true;
  scanHint.style.display   = 'block';
  scanHint.textContent     = 'Pointez vers le sol';
  helperText.style.display = 'none';
  createBtn.style.display  = 'none';
  createBtn.disabled       = false;
}

// ─── Capture helper ───────────────────────────────────────────────────────────
// The XR swap-chain framebuffer is cleared after every present so toDataURL()
// on renderer.domElement always reads blank. Instead:
//   1. Re-render Daguerre into a plain WebGLRenderTarget and read its pixels.
//   2. Read the XR camera texture (same texture the compositor shows) into a
//      second pixel buffer via a temporary WebGL framebuffer.
//   3. Composite camera -> Daguerre on a 2D canvas and return a data URL.
function renderSceneToDataURL(camTexInfo) {
  const w  = renderer.domElement.width;
  const h  = renderer.domElement.height;
  const gl = renderer.getContext();

  // 1. Render Daguerre into an off-screen target.
  const target = new THREE.WebGLRenderTarget(w, h, {
    format: THREE.RGBAFormat,
    type:   THREE.UnsignedByteType,
    depthBuffer: false,
  });
  renderer.setRenderTarget(target);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);

  const dagPixels = new Uint8Array(w * h * 4);
  renderer.readRenderTargetPixels(target, 0, 0, w, h, dagPixels);
  target.dispose();

  // 2. Read the XR camera texture via a temporary framebuffer.
  let camCanvas = null;
  if (camTexInfo?.texture) {
    const { texture, width: cw, height: ch } = camTexInfo;
    const fbo = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, texture, 0);

    if (gl.checkFramebufferStatus(gl.FRAMEBUFFER) === gl.FRAMEBUFFER_COMPLETE) {
      const camPixels = new Uint8Array(cw * ch * 4);
      gl.readPixels(0, 0, cw, ch, gl.RGBA, gl.UNSIGNED_BYTE, camPixels);

      camCanvas = document.createElement('canvas');
      camCanvas.width  = cw;
      camCanvas.height = ch;
      const camCtx  = camCanvas.getContext('2d');
      const camData = camCtx.createImageData(cw, ch);
      for (let row = 0; row < ch; row++) {  // Y-flip: WebGL origin is bottom-left
        camData.data.set(
          camPixels.subarray((ch - 1 - row) * cw * 4, (ch - row) * cw * 4),
          row * cw * 4
        );
      }
      camCtx.putImageData(camData, 0, 0);
    }

    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.deleteFramebuffer(fbo);
  }

  // 3. Composite: camera background then Daguerre on top.
  const scratch = document.createElement('canvas');
  scratch.width  = w;
  scratch.height = h;
  const ctx = scratch.getContext('2d');

  if (camCanvas) {
    const scale = Math.max(w / camCanvas.width, h / camCanvas.height); // cover
    const dw    = camCanvas.width  * scale;
    const dh    = camCanvas.height * scale;
    ctx.drawImage(camCanvas, (w - dw) / 2, (h - dh) / 2, dw, dh);
  }

  // Y-flip Daguerre pixels; source-over compositing respects chroma-key alpha.
  const daguCanvas = document.createElement('canvas');
  daguCanvas.width  = w;
  daguCanvas.height = h;
  const daguCtx = daguCanvas.getContext('2d');
  const dagData = daguCtx.createImageData(w, h);
  for (let row = 0; row < h; row++) {
    dagData.data.set(
      dagPixels.subarray((h - 1 - row) * w * 4, (h - row) * w * 4),
      row * w * 4
    );
  }
  daguCtx.putImageData(dagData, 0, 0);
  ctx.drawImage(daguCanvas, 0, 0);

  return scratch.toDataURL('image/png');
}

// ─── XR frame loop ────────────────────────────────────────────────────────────

function onXRFrame(timestamp, frame) {
  if (!frame) { renderer.render(scene, camera); return; }

  const refSpace = renderer.xr.getReferenceSpace();
  const session  = renderer.xr.getSession();

  if (!hitTestSourceRequested) {
    session.requestReferenceSpace('viewer').then(vs => {
      session.requestHitTestSource({ space: vs }).then(src => {
        hitTestSource = src;
      });
    });
    session.addEventListener('end', () => {
      hitTestSource          = null;
      hitTestSourceRequested = false;
    });
    hitTestSourceRequested = true;
  }

  if (!daguerrePlaced && hitTestSource) {
    const results = frame.getHitTestResults(hitTestSource);
    if (results.length > 0) {
      const pose = results[0].getPose(refSpace);
      reticle.visible = true;
      reticle.matrix.fromArray(pose.transform.matrix);
      if (placeBtn.disabled) {
        placeBtn.disabled    = false;
        scanHint.textContent = 'Sol detecte — appuyez pour placer';
      }
    } else {
      reticle.visible      = false;
      placeBtn.disabled    = true;
      scanHint.textContent = 'Pointez vers le sol';
    }
  }

  renderer.render(scene, camera);

  if (captureNextFrame) {
    captureNextFrame = false;

    // Grab the XR camera image for this exact frame while we're still inside
    // the frame callback (the texture is only valid within the same frame).
    let camTexInfo = null;
    if (xrBinding) {
      const viewerPose = frame.getViewerPose(refSpace);
      if (viewerPose) {
        const view = viewerPose.views[0]; // single view in handheld AR
        if (view?.camera) {
          camTexInfo = {
            texture: xrBinding.getCameraImage(view.camera),
            width:   view.camera.width,
            height:  view.camera.height,
          };
        }
      }
    }

    const dataURL = renderSceneToDataURL(camTexInfo);
    setTimeout(() => processDaguerreotype(dataURL), 30);
  }
}

</script>
