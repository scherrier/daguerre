<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Daguerre</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    #video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      z-index: 10;
      cursor: pointer;
    }

    #overlay h1 {
      color: #fff;
      font-size: clamp(22px, 5vw, 36px);
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    #overlay p {
      color: #ccc;
      font-size: clamp(14px, 3vw, 18px);
      margin-bottom: 32px;
    }

    .ar-cta-button {
      position: fixed;
      left: 50%;
      bottom: calc(24px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 20;

      min-height: 56px;
      min-width: 280px;
      max-width: calc(100vw - 32px);
      padding: 16px 24px;

      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 17px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: 0.015em;
      text-align: center;
      white-space: nowrap;

      color: #ffffff;
      background: linear-gradient(135deg, #165dff 0%, #00b8d9 100%);

      border: 1px solid rgba(255, 255, 255, 0.36);
      border-radius: 18px;

      box-shadow:
        0 14px 32px rgba(0, 118, 255, 0.32),
        inset 0 1px 0 rgba(255, 255, 255, 0.28);

      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;

      transition:
        transform 160ms ease,
        box-shadow 160ms ease,
        filter 160ms ease;
    }

    .ar-cta-button:active {
      transform: translateX(-50%) translateY(1px);
      filter: brightness(0.96);
      box-shadow:
        0 8px 18px rgba(0, 118, 255, 0.26),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .ar-cta-button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      pointer-events: none;
    }

    @media (max-width: 360px) {
      .ar-cta-button {
        min-width: auto;
        width: calc(100vw - 32px);
        font-size: 16px;
        white-space: normal;
      }
    }

    #errMsg {
      color: #f77;
      font-size: 14px;
      margin-top: 16px;
      display: none;
    }

  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<video id="charVideo" src="daguerre.mp4" autoplay loop muted playsinline
  style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"></video>

<div id="overlay">
  <button id="startBtn" class="ar-cta-button">Rencontrer Louis Daguerre</button>
  <div id="errMsg"></div>
</div>

<script>
// ─── Canvas setup ────────────────────────────────────────────────────────────

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Camera ──────────────────────────────────────────────────────────────────

const video    = document.getElementById('video');
const overlay  = document.getElementById('overlay');
const errMsg   = document.getElementById('errMsg');
let facingMode = 'environment';
let isVideoPlaying = false;

async function startCamera(mode) {
  try {
    if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: mode }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    isVideoPlaying = true;
    video.srcObject = stream;
    facingMode = mode;
    overlay.style.display = 'none';
  } catch (e) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      video.srcObject = stream;
      overlay.style.display = 'none';
    } catch (err) {
      errMsg.textContent = 'Camera unavailable: ' + err.message;
      errMsg.style.display = 'block';
    }
  }
}

document.getElementById('startBtn').addEventListener(
  'click',
  () => {
    startCamera(facingMode)
    startOrientationTracking();
});

// ─── Device orientation (ground anchoring) ──────────────────────────────────
// No real surface tracking here — we approximate a fixed ground-anchored
// point by remembering the phone's heading/tilt when the character is
// placed, then shifting it on screen as the phone pans/tilts away from
// that reference, using rough camera FOV angles.

const HORIZONTAL_FOV = 65; // approx environment-camera horizontal FOV (deg)
const VERTICAL_FOV   = 50; // approx environment-camera vertical FOV (deg)
const SMOOTHING       = 0.15; // exponential smoothing factor for jitter

let placedOrientation  = null;
let smoothedDeltaAlpha = 0;
let smoothedDeltaBeta  = 0;
let currentOrientation  = null; // latest reading, used to anchor at ground-found moment
let currentBeta         = null;
let orientationAvailable = false;

function angleDelta(a, b) {
  let d = a - b;
  while (d > 180) d -= 360;
  while (d < -180) d += 360;
  return d;
}

function handleOrientation(e) {
  orientationAvailable = true;
  if (e.alpha === null || e.beta === null) return;
  currentBeta        = e.beta;
  currentOrientation = { alpha: e.alpha, beta: e.beta };
  if (!placedOrientation) return; // anchor set only when ground is found
  const rawDeltaAlpha = angleDelta(e.alpha, placedOrientation.alpha);
  const rawDeltaBeta  = e.beta - placedOrientation.beta;
  smoothedDeltaAlpha += SMOOTHING * (rawDeltaAlpha - smoothedDeltaAlpha);
  smoothedDeltaBeta  += SMOOTHING * (rawDeltaBeta  - smoothedDeltaBeta);
}

function startOrientationTracking() {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(state => { if (state === 'granted') window.addEventListener('deviceorientation', handleOrientation); })
      .catch(() => {});
  } else {
    window.addEventListener('deviceorientation', handleOrientation);
  }
}

// Resolves a character's anchored ground position into screen-space
// fractions, given how far the phone has panned/tilted since placement.
function getGroundScreenPos(char) {
  if (!placedOrientation) return { xFrac: char.xFrac, yFrac: char.yFrac, visible: true };
  const xFrac = char.xFrac - smoothedDeltaAlpha / HORIZONTAL_FOV;
  const yFrac = char.yFrac - smoothedDeltaBeta  / VERTICAL_FOV;
  const visible = xFrac > -0.35 && xFrac < 1.35 && yFrac > -0.35 && yFrac < 1.35;
  return { xFrac, yFrac, visible };
}

// ─── Ground detection ────────────────────────────────────────────────────────
// Waits for the phone to be held upright (beta in a plausible range) before
// anchoring Daguerre and fading him in. On desktop (no orientation API) the
// ground is considered found after a short fixed delay.

const GROUND_DETECT_MS = 2000; // ms of stable valid tilt before "found"
const BETA_MIN         = 35;   // device tilted at least 35° from flat
const BETA_MAX         = 100;

let groundFound       = false;
let groundDetectStart = null;
let groundOpacity     = 0;   // Daguerre fades in from 0 → 1
let scanOpacity       = 1;   // scan indicator fades out from 1 → 0

function isLookingAtGround() {
  if (!orientationAvailable) return true; // desktop fallback: always ready
  return currentBeta !== null && currentBeta >= BETA_MIN && currentBeta <= BETA_MAX;
}

function updateGroundDetection(ts) {
  if (groundFound) {
    groundOpacity = Math.min(1, groundOpacity + 0.03);
    scanOpacity   = Math.max(0, scanOpacity   - 0.05);
    return;
  }
  if (isLookingAtGround()) {
    if (!groundDetectStart) groundDetectStart = ts;
    if (ts - groundDetectStart >= GROUND_DETECT_MS) {
      groundFound        = true;
      placedOrientation  = currentOrientation ? { ...currentOrientation } : null;
      smoothedDeltaAlpha = 0;
      smoothedDeltaBeta  = 0;
    }
  } else {
    groundDetectStart = null;
  }
}

function drawScanIndicator(ts) {
  if (scanOpacity <= 0) return;

  const cx = canvas.width  * 0.5;
  const cy = canvas.height * 0.84;
  const rx = canvas.width  * 0.22;
  const ry = canvas.height * 0.055;

  const looking  = isLookingAtGround();
  const progress = looking && groundDetectStart
    ? Math.min(1, (ts - groundDetectStart) / GROUND_DETECT_MS)
    : 0;

  ctx.save();
  ctx.globalAlpha = scanOpacity;

  // Dashed oval representing the ground plane
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth   = 2;
  ctx.setLineDash([8, 6]);
  ctx.stroke();

  // Filled arc showing detection progress
  if (progress > 0) {
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, -Math.PI / 2, -Math.PI / 2,
                -Math.PI / 2 + Math.PI * 2 * progress);
    ctx.strokeStyle = 'rgba(80, 210, 255, 0.9)';
    ctx.lineWidth   = 3;
    ctx.setLineDash([]);
    ctx.stroke();
  }

  // Orbiting dots
  const t = (ts / 900) % 1;
  for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * Math.PI * 2 + t * Math.PI * 2;
    const alpha = 0.35 + 0.65 * ((i / 6 + t) % 1);
    ctx.beginPath();
    ctx.arc(cx + Math.cos(angle) * rx, cy + Math.sin(angle) * ry, 3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(80, 210, 255, ${alpha})`;
    ctx.setLineDash([]);
    ctx.fill();
  }

  // Status label
  const fontSize = Math.max(13, Math.round(canvas.width * 0.033));
  ctx.font      = `${fontSize}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.setLineDash([]);
  ctx.fillText(
    groundFound ? 'Ground found!'              :
    looking     ? 'Detecting ground surface…'  :
                  'Point camera at the ground',
    cx, cy + ry + fontSize + 6
  );

  ctx.restore();
}

// ─── WebGL chroma key ────────────────────────────────────────────────────────
// Runs on GPU at native video resolution — no downscaling, smooth edges.

const charVideo = document.getElementById('charVideo');

const glCanvas = document.createElement('canvas');
glCanvas.style.cssText = 'position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;';
document.body.appendChild(glCanvas);

const gl = glCanvas.getContext('webgl',             { alpha: true, premultipliedAlpha: false })
        || glCanvas.getContext('experimental-webgl', { alpha: true, premultipliedAlpha: false });

// Vertex shader: fullscreen quad, flip Y so video is right-side up
const VS = `
  attribute vec2 aPos;
  varying vec2 vUV;
  void main() {
    vUV = vec2(aPos.x * 0.5 + 0.5, aPos.y * 0.5 + 0.5);
    gl_Position = vec4(aPos, 0.0, 1.0);
  }
`;

// Fragment shader: smoothstep chroma key — soft transparent edges, no hard cutoff
const FS = `
  precision mediump float;
  uniform sampler2D uTex;
  varying vec2 vUV;
  void main() {
    vec4 c = texture2D(uTex, vUV);
    // How much greener this pixel is than its red/blue channels
    float greenness = c.g - max(c.r, c.b);
    // Aggressive removal: starts at 0.05, fully transparent by 0.3
    float a = 1.0 - smoothstep(0.01, 0.2, greenness);
    // Spill suppression: cap green channel at max(r,b) on every pixel,
    // including fully opaque ones like hair that pick up green light from the screen
    float spill = max(0.0, greenness);
    vec3 col = vec3(c.r, c.g - spill, c.b);
    gl_FragColor = vec4(col, a);
  }
`;

function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compileShader(gl.VERTEX_SHADER,   VS));
gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
gl.useProgram(prog);

// Fullscreen quad: two triangles as a strip
const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const posLoc = gl.getAttribLocation(prog, 'aPos');
gl.enableVertexAttribArray(posLoc);
gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

// Video texture
const tex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, tex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
gl.uniform1i(gl.getUniformLocation(prog, 'uTex'), 0);
gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
gl.clearColor(0, 0, 0, 0);

let charReady = false;

function initGL() {
  if (charReady) return;
  const vw = charVideo.videoWidth, vh = charVideo.videoHeight;
  if (!vw || !vh) return;
  // Use native video resolution — no quality loss
  glCanvas.width  = vw;
  glCanvas.height = vh;
  gl.viewport(0, 0, vw, vh);
  charReady = true;
}

charVideo.addEventListener('loadedmetadata', initGL);
if (charVideo.readyState >= 1) initGL();
charVideo.play().catch(() => {});

function processCharFrame() {
  if (!charReady || charVideo.readyState < 2) return false;
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, charVideo);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  return true;
}

// ─── Characters ──────────────────────────────────────────────────────────────

let characters    = [];
let charIdCounter = 0;

function spawnCharacter(xFrac, yFrac) {
  characters.push({
    id:    charIdCounter++,
    xFrac,
    yFrac,
    dir:   -1,
    speed: 1,
    scale: 3
  });
}

spawnCharacter(0.5, 0.9);

// ─── Character renderer ──────────────────────────────────────────────────────

function drawCharacter(char) {
  if (!charReady) return;
  const { dir, scale } = char;
  const { xFrac, yFrac, visible } = getGroundScreenPos(char);
  if (!visible) return;
  const gx = xFrac * canvas.width;
  const gy = yFrac * canvas.height;

  const drawH  = canvas.height * 0.30 * scale;
  const aspect = glCanvas.width / glCanvas.height;
  const drawW  = drawH * aspect;

  ctx.save();
  ctx.translate(gx, gy);
  if (dir === -1) ctx.scale(-1, 1);
  ctx.drawImage(glCanvas, -drawW / 2, -drawH, drawW, drawH);
  ctx.restore();
}

// ─── Main loop ───────────────────────────────────────────────────────────────

function loop(ts) {
  requestAnimationFrame(loop);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  processCharFrame();
  if (isVideoPlaying) {
    updateGroundDetection(ts);
    drawScanIndicator(ts);
    if (groundFound) {
      ctx.save();
      ctx.globalAlpha = groundOpacity;
      drawCharacter(characters[0]);
      ctx.restore();
    }
  }
}

requestAnimationFrame(loop);
</script>
</body>
</html>
