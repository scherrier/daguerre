<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Daguerre</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    /* Three.js appends its <canvas> — keep it behind DOM overlays */
    canvas {
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── AR overlay (visible during the XR session) ──────────────────── */
    #ar-ui {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: calc(32px + env(safe-area-inset-bottom));
      pointer-events: none;   /* pass-through; buttons below opt back in */
    }

    #scan-hint {
      color: rgba(255, 255, 255, 0.9);
      font-size: clamp(14px, 3.5vw, 17px);
      font-weight: 500;
      margin-bottom: 18px;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.7);
      text-align: center;
      padding: 0 24px;
    }

    /* ── Landing screen ──────────────────────────────────────────────── */
    #start-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.75);
      z-index: 10;
    }

    /* ── Shared button style ─────────────────────────────────────────── */
    .ar-cta-button {
      display: inline-block;
      min-height: 56px;
      min-width: 280px;
      max-width: calc(100vw - 32px);
      padding: 16px 24px;

      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 17px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: 0.015em;
      text-align: center;
      white-space: nowrap;

      color: #ffffff;
      background: linear-gradient(135deg, #165dff 0%, #00b8d9 100%);
      border: 1px solid rgba(255, 255, 255, 0.36);
      border-radius: 18px;
      box-shadow:
        0 14px 32px rgba(0, 118, 255, 0.32),
        inset 0 1px 0 rgba(255, 255, 255, 0.28);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      pointer-events: auto;
      transition: transform 160ms ease, box-shadow 160ms ease,
                  filter 160ms ease, opacity 160ms ease;
    }

    .ar-cta-button:active {
      transform: translateY(1px);
      filter: brightness(0.96);
      box-shadow:
        0 8px 18px rgba(0, 118, 255, 0.26),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .ar-cta-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }

    @media (max-width: 360px) {
      .ar-cta-button {
        min-width: auto;
        width: calc(100vw - 32px);
        font-size: 16px;
        white-space: normal;
      }
    }

    #errMsg {
      color: #f77;
      font-size: 14px;
      margin-top: 16px;
      display: none;
      text-align: center;
      max-width: 300px;
      padding: 0 16px;
    }
  </style>
</head>
<body>

<!-- Character video — hidden, started only after placement -->
<video id="charVideo" src="daguerre.mp4" muted playsinline
  style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"></video>

<!-- DOM overlay shown during the AR session -->
<div id="ar-ui">
  <p id="scan-hint">Pointez vers le sol</p>
  <button id="placeBtn" class="ar-cta-button" disabled>Placer Louis Daguerre ici</button>
</div>

<!-- Landing screen -->
<div id="start-overlay">
  <button id="startBtn" class="ar-cta-button">Rencontrer Louis Daguerre</button>
  <div id="errMsg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>

// ─── Scene ───────────────────────────────────────────────────────────────────

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Reticle (hit-test indicator on the detected ground) ─────────────────────

const reticle = new THREE.Mesh(
  new THREE.RingGeometry(0.10, 0.13, 32).rotateX(-Math.PI / 2),
  new THREE.MeshBasicMaterial({ color: 0x50d2ff, side: THREE.DoubleSide })
);
reticle.matrixAutoUpdate = false; // matrix set from hit-test each frame
reticle.visible = false;
scene.add(reticle);

// ─── Daguerre character ───────────────────────────────────────────────────────

const charVideo = document.getElementById('charVideo');
const DAGUERRE_HEIGHT = 1.72; // metres — calibrated to real-world standing height

const videoTex = new THREE.VideoTexture(charVideo);
videoTex.minFilter = THREE.LinearFilter;
videoTex.magFilter = THREE.LinearFilter;

// Chroma-key shader — same algorithm as before, now as a Three.js material
const daguerreMat = new THREE.ShaderMaterial({
  uniforms: { uTex: { value: videoTex } },
  vertexShader: `
    varying vec2 vUV;
    void main() {
      vUV = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    precision mediump float;
    uniform sampler2D uTex;
    varying vec2 vUV;
    void main() {
      vec4 c      = texture2D(uTex, vUV);
      float green = c.g - max(c.r, c.b);
      float a     = 1.0 - smoothstep(0.01, 0.2, green);
      float spill = max(0.0, green);
      gl_FragColor = vec4(c.r, c.g - spill, c.b, a);
    }
  `,
  transparent: true,
  side: THREE.FrontSide,
  depthWrite: false,
});

let daguerreMesh   = null;
let daguerrePlaced = false;

function buildDaguerreMesh() {
  if (daguerreMesh) return;
  const vw     = charVideo.videoWidth  || 9;  // fallback 9:16 if metadata not yet ready
  const vh     = charVideo.videoHeight || 16;
  const planeW = DAGUERRE_HEIGHT * (vw / vh);
  daguerreMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(planeW, DAGUERRE_HEIGHT),
    daguerreMat
  );
  daguerreMesh.matrixAutoUpdate = false; // position written once at placement, never again
}

charVideo.addEventListener('loadedmetadata', buildDaguerreMesh);
if (charVideo.readyState >= 1) buildDaguerreMesh();

// ─── Placement ────────────────────────────────────────────────────────────────

function placeDaguerre() {
  if (!reticle.visible || daguerrePlaced) return;
  daguerrePlaced = true;

  buildDaguerreMesh();

  // Ground position from the reticle (which mirrors the current hit-test result)
  const hitPos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);

  // Compute Y-only rotation so Daguerre faces the camera at placement time,
  // then freeze that rotation — never updated again.
  const cam   = camera.position;
  const theta = Math.atan2(cam.x - hitPos.x, cam.z - hitPos.z);

  // Set world matrix: rotate around Y to face camera, shift centre up by half height.
  // matrixAutoUpdate = false means Three.js will never overwrite this matrix.
  daguerreMesh.matrix
    .makeRotationY(theta)
    .setPosition(hitPos.x, hitPos.y + DAGUERRE_HEIGHT / 2, hitPos.z);

  scene.add(daguerreMesh); // added to scene, NOT to camera — stays fixed in world space

  reticle.visible        = false;
  placeBtn.style.display = 'none';
  scanHint.style.display = 'none';

  charVideo.play().catch(() => {});
}

// Move back Daguerre video to the start when it ends
charVideo.addEventListener('ended', () => {
  charVideo.currentTime = 0;
});

// ─── UI ───────────────────────────────────────────────────────────────────────

const startOverlay = document.getElementById('start-overlay');
const arUI         = document.getElementById('ar-ui');
const scanHint     = document.getElementById('scan-hint');
const placeBtn     = document.getElementById('placeBtn');
const errMsg       = document.getElementById('errMsg');

placeBtn.addEventListener('click', () => {
  charVideo.play().catch(() => {}); // unlock video in user-gesture context before placement
  placeDaguerre();
});

function showError(msg) {
  errMsg.textContent   = msg;
  errMsg.style.display = 'block';
}

// ─── WebXR session ────────────────────────────────────────────────────────────

let hitTestSource          = null;
let hitTestSourceRequested = false;

document.getElementById('startBtn').addEventListener('click', startAR);

async function startAR() {
  if (!navigator.xr) {
    showError('WebXR non disponible. Essayez Chrome sur Android.');
    return;
  }
  const supported = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
  if (!supported) {
    showError('RA non supportee sur cet appareil ou navigateur.');
    return;
  }

  try {
    const session = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay'],
      domOverlay: { root: arUI },
    });

    renderer.xr.setReferenceSpaceType('local');
    await renderer.xr.setSession(session);
    renderer.setAnimationLoop(onXRFrame);

    startOverlay.style.display = 'none';
    arUI.style.display         = 'flex';

    session.addEventListener('end', onSessionEnd);
  } catch (e) {
    showError('Impossible de demarrer la RA : ' + e.message);
  }
}

function onSessionEnd() {
  if (daguerreMesh) scene.remove(daguerreMesh);
  daguerreMesh           = null;
  daguerrePlaced         = false;
  hitTestSource          = null;
  hitTestSourceRequested = false;
  reticle.visible        = false;

  renderer.setAnimationLoop(null);
  startOverlay.style.display  = 'flex';
  arUI.style.display          = 'none';
  placeBtn.style.display      = 'block';
  placeBtn.disabled           = true;
  scanHint.style.display      = 'block';
  scanHint.textContent        = 'Pointez vers le sol';
}

// ─── XR frame loop ────────────────────────────────────────────────────────────
// Only the camera pose is updated continuously (by Three.js XR manager).
// Daguerre's matrix is written once at placement and never touched again.

function onXRFrame(timestamp, frame) {
  if (!frame) { renderer.render(scene, camera); return; }

  const refSpace = renderer.xr.getReferenceSpace();
  const session  = renderer.xr.getSession();

  // Request the hit-test source once, on the very first XR frame
  if (!hitTestSourceRequested) {
    session.requestReferenceSpace('viewer').then(vs => {
      session.requestHitTestSource({ space: vs }).then(src => {
        hitTestSource = src;
      });
    });
    session.addEventListener('end', () => {
      hitTestSource          = null;
      hitTestSourceRequested = false;
    });
    hitTestSourceRequested = true;
  }

  // Before placement: update reticle from hit-test results each frame
  if (!daguerrePlaced && hitTestSource) {
    const results = frame.getHitTestResults(hitTestSource);
    if (results.length > 0) {
      const pose = results[0].getPose(refSpace);
      reticle.visible = true;
      reticle.matrix.fromArray(pose.transform.matrix);
      if (placeBtn.disabled) {
        placeBtn.disabled    = false;
        scanHint.textContent = 'Sol detecte — appuyez pour placer';
      }
    } else {
      reticle.visible   = false;
      placeBtn.disabled = true;
      scanHint.textContent = 'Pointez vers le sol';
    }
  }

  // After placement: nothing in this loop touches daguerreMesh.
  // The camera is the only object updated from XR data.
  renderer.render(scene, camera);
}

</script>
</body>
</html>
