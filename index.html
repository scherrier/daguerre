<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>Daguerre</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: url('ar-bg.png') center / cover no-repeat;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    /* Camera feed + AR scene, drawn into this canvas by the AR provider.
       There's no dom-overlay compositor here (that's a WebXR-only concept),
       so every overlay below needs an explicit z-index above this canvas. */
    #camerafeed {
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      z-index: 0;
    }

    /* ── AR overlay (visible while the AR provider is running) ────────── */
    #ar-ui {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: calc(32px + env(safe-area-inset-bottom));
      pointer-events: none;
    }

    #scan-hint {
      color: rgba(255, 255, 255, 0.9);
      font-size: clamp(14px, 3.5vw, 17px);
      font-weight: 500;
      margin-bottom: 18px;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.7);
      text-align: center;
      padding: 0 24px;
    }

    /* Helper text shown after video ends */
    .daguerre-helper-text {
      position: fixed;
      left: 50%;
      bottom: calc(96px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 19;
      max-width: calc(100vw - 40px);
      padding: 10px 14px;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.35;
      text-align: center;
      color: rgba(255, 255, 255, 0.96);
      background: rgba(8, 18, 32, 0.58);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
      pointer-events: none;
    }

    /* ── Landing screen ──────────────────────────────────────────────── */
    #start-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.75);
      z-index: 10;
    }

    /* ── Shared button style ─────────────────────────────────────────── */
    .ar-cta-button {
      display: inline-block;
      min-height: 56px;
      min-width: 280px;
      max-width: calc(100vw - 32px);
      padding: 16px 24px;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 17px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: 0.015em;
      text-align: center;
      white-space: nowrap;
      color: #ffffff;
      background: linear-gradient(135deg, #165dff 0%, #00b8d9 100%);
      border: 1px solid rgba(255, 255, 255, 0.36);
      border-radius: 18px;
      box-shadow:
        0 14px 32px rgba(0, 118, 255, 0.32),
        inset 0 1px 0 rgba(255, 255, 255, 0.28);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      pointer-events: auto;
      transition: transform 160ms ease, box-shadow 160ms ease,
                  filter 160ms ease, opacity 160ms ease;
    }

    .ar-cta-button:active {
      transform: translateY(1px);
      filter: brightness(0.96);
      box-shadow:
        0 8px 18px rgba(0, 118, 255, 0.26),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .ar-cta-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }

    @media (max-width: 360px) {
      .ar-cta-button {
        min-width: auto;
        width: calc(100vw - 32px);
        font-size: 16px;
        white-space: normal;
      }
    }

    #errMsg {
      color: #f77;
      font-size: 14px;
      margin-top: 16px;
      display: none;
      text-align: center;
      max-width: 300px;
      padding: 0 16px;
    }

    /* ── Loading overlay ─────────────────────────────────────────────── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.62);
      z-index: 45;
    }

    #loading-text {
      color: rgba(255, 255, 255, 0.9);
      font-family: "Inter", system-ui, sans-serif;
      font-size: 16px;
      font-weight: 500;
      text-align: center;
      letter-spacing: 0.01em;
    }

    /* ── Result overlay ──────────────────────────────────────────────── */
    #result-overlay {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      background: #000;
      z-index: 50;
    }

    #result-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #result-actions {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding-bottom: calc(32px + env(safe-area-inset-bottom));
      width: 100%;
    }

    #resumeBtn, .ar-text-button {
      color: rgba(255, 255, 255, 0.75);
      font-family: "Inter", system-ui, sans-serif;
      font-size: 15px;
      font-weight: 500;
      background: none;
      border: none;
      cursor: pointer;
      pointer-events: auto;
      padding: 8px 20px;
      -webkit-tap-highlight-color: transparent;
    }

    .ar-text-button {
      margin-top: 14px;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.7);
    }
  </style>
</head>
<body>

<!-- Camera feed + AR scene, drawn into this canvas by the AR provider -->
<canvas id="camerafeed"></canvas>

<!-- Character video — no loop; plays once, holds the last frame -->
<video id="charVideo" src="daguerre.mp4" muted playsinline
  style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"></video>

<!-- DOM overlay shown while the AR provider is running -->
<div id="ar-ui">
  <!-- Phase 1: scanning + placement -->
  <p id="scan-hint">Pointez vers le sol</p>
  <button id="placeBtn" class="ar-cta-button" disabled>Placer Louis Daguerre ici</button>
  <button id="recenterBtn" class="ar-text-button">Le suivi tremble ? Recentrer</button>

  <!-- Phase 2: after video ends — helper text uses its own fixed position -->
  <p id="helperText" class="daguerre-helper-text" style="display:none">
    Ajoutez une personne à la scène ou capturez simplement Louis Daguerre.
  </p>
  <button id="createBtn" class="ar-cta-button" style="display:none">
    Créer un daguerréotype
  </button>

  <!-- Processing state -->
  <div id="loading-overlay">
    <p id="loading-text">Création du daguerréotype...</p>
  </div>

  <!-- Result screen -->
  <div id="result-overlay">
    <img id="result-img" alt="" />
    <div id="result-actions">
      <button id="saveBtn" class="ar-cta-button">Enregistrer l'image</button>
      <button id="resumeBtn">Reprendre</button>
    </div>
  </div>
</div>

<!-- Landing screen -->
<div id="start-overlay">
  <button id="startBtn" class="ar-cta-button">Rencontrer Louis Daguerre</button>
  <div id="errMsg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<!-- 8th Wall self-hosted engine binary: no app key, no 8thwall.com account needed.
     Works via getUserMedia + its own SLAM tracking, so — unlike WebXR — it runs
     on both Android Chrome and iOS Safari. -->
<script async src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" data-preload-chunks="slam"></script>
<script src="//cdn.8thwall.com/web/xrextras/xrextras.js"></script>

<script>
/* globals XR8 XRExtras THREE */

// ─── AR Provider Layer ─────────────────────────────────────────────────────
// Everything specific to "how AR works on this device" lives here, behind
// the small ARProvider interface below. App Logic never touches XR8, THREE
// scene/camera, or raycasting directly — it only calls these methods. If
// this provider ever needs replacing (e.g. with MindAR), this is the only
// block that should change.
//
// 8th Wall has no real surface/plane detection (unlike WebXR's hit-test) —
// it only provides 6DoF SLAM camera tracking. Placement is approximated by
// raycasting from the centre of the screen against an invisible plane fixed
// at y=0, with the camera assumed to start at EYE_HEIGHT above it.

const ARProvider = (() => {
  const EYE_HEIGHT = 1.2; // assumed phone height above the ground while aiming down at it, metres

  let scene  = null;
  let camera = null;
  let ground = null;
  let reticleMesh    = null;
  let reticlePoint   = null;
  let trackingReticle = true;
  let visibilityCb    = null;
  let pendingCapture  = null;

  const raycaster = new THREE.Raycaster();

  function arPipelineModule() {
    return {
      name: 'ar-provider',

      onStart: () => {
        ({ scene, camera } = XR8.Threejs.xrScene());

        reticleMesh = new THREE.Mesh(
          new THREE.RingGeometry(0.10, 0.13, 32).rotateX(-Math.PI / 2),
          new THREE.MeshBasicMaterial({ color: 0x50d2ff, side: THREE.DoubleSide }),
        );
        reticleMesh.matrixAutoUpdate = false;
        reticleMesh.visible = false;
        scene.add(reticleMesh);

        // Invisible stand-in for "the ground" — there's no real surface
        // detection, this plane is always at y=0 regardless of where the
        // actual floor is in the camera image.
        // ground = new THREE.Mesh(
        //   new THREE.PlaneGeometry(100, 100),
        //   new THREE.MeshBasicMaterial({ visible: false }),
        // );
        // ground.rotateX(-Math.PI / 2);
        // scene.add(ground);

        // camera.position.set(0, EYE_HEIGHT, 0);
        // XR8.XrController.updateCameraProjectionMatrix({
        //   origin: camera.position,
        //   facing: camera.quaternion,
        // });
      },

      // Runs every frame before rendering. Only updates the reticle before
      // something has been placed.
      onUpdate: () => {
        if (!trackingReticle) return;

        const dir = new THREE.Vector3(0, 0, -1);
        dir.applyQuaternion(camera.quaternion);
        reticlePoint = camera.position.clone().add(
            dir.multiplyScalar(2.0)
        );
        reticleMesh.visible = true;
        reticleMesh.matrix.identity().setPosition(reticlePoint);
        visibilityCb?.(reticleMesh.visible)

        // raycaster.setFromCamera({ x: 0, y: 0 }, camera);
        // const hits = raycaster.intersectObject(ground);
        // const wasVisible = reticleMesh.visible;

        // if (hits.length && hits[0].distance < 6) {
        //   reticlePoint = hits[0].point.clone();
        //   reticleMesh.visible = true;
        //   reticleMesh.matrix.identity().setPosition(reticlePoint);
        // } else {
        //   reticlePoint = null;
        //   reticleMesh.visible = false;
        // }

        // if (reticleMesh.visible !== wasVisible) visibilityCb?.(reticleMesh.visible);
      },

      // Runs every frame after the camera feed + three.js scene have been
      // drawn into the canvas. This is a plain canvas (no XR swap-chain to
      // worry about), so the just-drawn pixels are still readable here.
      onRender: () => {
        if (!pendingCapture) return;
        const cb = pendingCapture;
        pendingCapture = null;
        cb(document.getElementById('camerafeed').toDataURL('image/png'));
      },
    };
  }

  return {
    start({ canvas, onError }) {
      window.addEventListener('xrerror', (e) => {
        onError?.(e.detail?.message || e.detail?.title || 'AR error');
      });

      const begin = () => {
        XR8.addCameraPipelineModules([
          XR8.GlTextureRenderer.pipelineModule(),      // draws the camera feed
          XR8.Threejs.pipelineModule(),                // sets up the three.js scene/camera
          XR8.XrController.pipelineModule(),           // SLAM 6DoF tracking
          XRExtras.AlmostThere.pipelineModule(),       // unsupported-browser hints
          XRExtras.FullWindowCanvas.pipelineModule(),  // makes the canvas fill the window
          XRExtras.Loading.pipelineModule(),           // loading screen while camera/SLAM start
          XRExtras.RuntimeError.pipelineModule(),       // error overlay on crash
          arPipelineModule(),
        ]);
        XR8.run({ canvas });
      };

      if (window.XR8) { begin(); return; }
      window.addEventListener('xrextrasloaded', begin, { once: true });
    },

    onReticleVisibilityChange(cb) { visibilityCb = cb; },
    getReticlePoint()             { return reticlePoint; },
    getCameraPosition()           { return camera.position; },

    // Adds an object to the world (not the camera) at a fixed pose. The pose
    // is set once and never recalculated, so the object stays put in world
    // space regardless of how the camera moves afterwards.
    placeObjectInWorld(object3D, position, rotationY) {
      trackingReticle      = false;
      reticleMesh.visible  = false;

      object3D.matrixAutoUpdate = false;
      object3D.matrix.makeRotationY(rotationY).setPosition(position.x, position.y, position.z);
      scene.add(object3D);
    },

    // Captures the composited camera + AR scene on the next rendered frame.
    requestCapture(cb) { pendingCapture = cb; },

    // Resets SLAM tracking to treat the current camera pose as the new
    // origin. Only safe before placement — calling it afterwards would
    // redefine the world frame out from under the placed object and make
    // it jump. Useful when tracking starts on a feature-poor/dark surface.
    recenter() { XR8.XrController.recenter(); },
  };
})();

// ─── App Logic Layer ────────────────────────────────────────────────────────
// UI states, video playback, placement decision, and the daguerreotype
// filter — unchanged in spirit from the WebXR version. The only difference
// is that AR specifics are reached through ARProvider instead of touching
// THREE/XR8 directly.

const charVideo = document.getElementById('charVideo');
const DAGUERRE_HEIGHT = 1.72; // metres

const videoTex = new THREE.VideoTexture(charVideo);
videoTex.minFilter = THREE.LinearFilter;
videoTex.magFilter = THREE.LinearFilter;

const daguerreMat = new THREE.ShaderMaterial({
  uniforms: { uTex: { value: videoTex } },
  vertexShader: `
    varying vec2 vUV;
    void main() {
      vUV = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    precision mediump float;
    uniform sampler2D uTex;
    varying vec2 vUV;
    void main() {
      vec4 c      = texture2D(uTex, vUV);
      float green = c.g - max(c.r, c.b);
      float a     = 1.0 - smoothstep(0.01, 0.2, green);
      float spill = max(0.0, green);
      gl_FragColor = vec4(c.r, c.g - spill, c.b, a);
    }
  `,
  transparent: true,
  side: THREE.FrontSide,
  depthWrite: false,
});

let daguerreMesh   = null;
let daguerrePlaced = false;

function buildDaguerreMesh() {
  if (daguerreMesh) return;
  const vw     = charVideo.videoWidth  || 9;
  const vh     = charVideo.videoHeight || 16;
  const planeW = DAGUERRE_HEIGHT * (vw / vh);
  daguerreMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(planeW, DAGUERRE_HEIGHT),
    daguerreMat
  );
}

charVideo.addEventListener('loadedmetadata', buildDaguerreMesh);
if (charVideo.readyState >= 1) buildDaguerreMesh();

// When the video ends: hold the last frame, reveal the daguerreotype CTA
charVideo.addEventListener('ended', () => {
  helperText.style.display = 'block';
  createBtn.style.display  = 'block';
});

// ─── Placement ────────────────────────────────────────────────────────────────

function placeDaguerre() {
  const point = ARProvider.getReticlePoint();
  if (!point || daguerrePlaced) return;
  daguerrePlaced = true;

  buildDaguerreMesh();

  const cam   = ARProvider.getCameraPosition();
  const theta = Math.atan2(cam.x - point.x, cam.z - point.z);

  ARProvider.placeObjectInWorld(
    daguerreMesh,
    { x: point.x, y: point.y + DAGUERRE_HEIGHT / 2, z: point.z },
    theta,
  );

  placeBtn.style.display    = 'none';
  scanHint.style.display    = 'none';

  charVideo.play().catch(() => {});
}

// ─── UI references ────────────────────────────────────────────────────────────

const startOverlay   = document.getElementById('start-overlay');
const arUI            = document.getElementById('ar-ui');
const scanHint        = document.getElementById('scan-hint');
const placeBtn        = document.getElementById('placeBtn');
const recenterBtn     = document.getElementById('recenterBtn');
const helperText      = document.getElementById('helperText');
const createBtn       = document.getElementById('createBtn');
const errMsg          = document.getElementById('errMsg');
const loadingOverlay  = document.getElementById('loading-overlay');
const resultOverlay   = document.getElementById('result-overlay');
const resultImg       = document.getElementById('result-img');
const saveBtn         = document.getElementById('saveBtn');
const resumeBtn       = document.getElementById('resumeBtn');

placeBtn.addEventListener('click', () => {
  charVideo.play().catch(() => {});
  placeDaguerre();
});

recenterBtn.addEventListener('click', () => {
  ARProvider.recenter();
});

ARProvider.onReticleVisibilityChange((visible) => {
  placeBtn.disabled    = !visible;
  scanHint.textContent = visible ? 'Sol detecte — appuyez pour placer' : 'Pointez vers le sol';
});

// ─── Capture + daguerreotype filter ──────────────────────────────────────────

let processingCapture = false;
let savedDataURL      = null;

createBtn.addEventListener('click', () => {
  if (processingCapture) return;
  processingCapture = true;
  createBtn.disabled = true;
  loadingOverlay.style.display = 'flex';
  recenterBtn.style.display = 'none';

  ARProvider.requestCapture((dataURL) => {
    setTimeout(() => processDaguerreotype(dataURL), 30);
  });
});

saveBtn.addEventListener('click', () => {
  if (!savedDataURL) return;
  const a      = document.createElement('a');
  a.href       = savedDataURL;
  a.download   = 'daguerreotype.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
});

resumeBtn.addEventListener('click', () => {
  resultOverlay.style.display = 'none';
  createBtn.disabled          = false;
  processingCapture           = false;
  recenterBtn.style.display   = 'block';
});

function loadImage(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.src = src;
  });
}

async function processDaguerreotype(dataURL) {
  const img = await loadImage(dataURL);

  const offscreen = document.createElement('canvas');
  offscreen.width  = img.width;
  offscreen.height = img.height;
  const c = offscreen.getContext('2d');
  const w = offscreen.width;
  const h = offscreen.height;

  // Dark silver-plate background fills any transparent areas from the AR layer.
  c.fillStyle = '#080a10';
  c.fillRect(0, 0, w, h);
  c.drawImage(img, 0, 0);

  // ── Precompute S-curve lookup table (integer 0-255 → float 0-1) ──────────
  // Using a sigmoid so shadows and highlights are treated symmetrically.
  // Lifted blacks (min ≈ 0.05) keep shadows deep but not crushed.
  const lut = new Float32Array(256);
  for (let i = 0; i < 256; i++) {
    let x = i / 255;
    x = 1 / (1 + Math.exp(-6 * (x - 0.5))); // sigmoid S-curve
    x = x * 0.92 + 0.04;                     // lift blacks, compress highlights
    x = Math.pow(x, 0.92);                   // gentle gamma lift in midtones
    lut[i] = x;
  }

  // ── Pass 1: extract grayscale luminance for all downstream operations ─────
  const raw  = c.getImageData(0, 0, w, h);
  const d    = raw.data;
  const gray = new Uint8Array(w * h);
  for (let i = 0, p = 0; i < d.length; i += 4, p++) {
    gray[p] = (0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2]) | 0;
  }

  // ── Build a blurred copy of the grayscale image (local contrast base) ─────
  // We draw the gray image to an offscreen canvas, apply a CSS blur filter,
  // then read it back. The high-pass (original − blurred) is the local detail
  // signal; adding it back after tone-mapping sharpens flat areas uniformly.
  const grayCanvas = document.createElement('canvas');
  grayCanvas.width  = w;
  grayCanvas.height = h;
  const grayCtx  = grayCanvas.getContext('2d');
  const grayImgD = grayCtx.createImageData(w, h);
  for (let p = 0; p < gray.length; p++) {
    const v = gray[p];
    grayImgD.data[p * 4]     = v;
    grayImgD.data[p * 4 + 1] = v;
    grayImgD.data[p * 4 + 2] = v;
    grayImgD.data[p * 4 + 3] = 255;
  }
  grayCtx.putImageData(grayImgD, 0, 0);

  const blurCanvas = document.createElement('canvas');
  blurCanvas.width  = w;
  blurCanvas.height = h;
  const blurCtx = blurCanvas.getContext('2d');
  blurCtx.filter = 'blur(12px)';
  blurCtx.drawImage(grayCanvas, 0, 0);
  const blurData = blurCtx.getImageData(0, 0, w, h).data;

  // ── Build bloom mask: bright pixels only, then blur for soft glow ─────────
  const BLOOM_THRESH = 0.72;
  const bloomSrc = document.createElement('canvas');
  bloomSrc.width  = w;
  bloomSrc.height = h;
  const bloomSrcCtx  = bloomSrc.getContext('2d');
  const bloomSrcImgD = bloomSrcCtx.createImageData(w, h);
  for (let p = 0; p < gray.length; p++) {
    const v    = gray[p] / 255;
    const mask = v > BLOOM_THRESH ? ((v - BLOOM_THRESH) / (1 - BLOOM_THRESH)) * 255 : 0;
    const m    = mask | 0;
    bloomSrcImgD.data[p * 4]     = m;
    bloomSrcImgD.data[p * 4 + 1] = m;
    bloomSrcImgD.data[p * 4 + 2] = m;
    bloomSrcImgD.data[p * 4 + 3] = 255;
  }
  bloomSrcCtx.putImageData(bloomSrcImgD, 0, 0);

  const bloomBlur = document.createElement('canvas');
  bloomBlur.width  = w;
  bloomBlur.height = h;
  const bloomBlurCtx = bloomBlur.getContext('2d');
  bloomBlurCtx.filter = 'blur(22px)';
  bloomBlurCtx.drawImage(bloomSrc, 0, 0);

  // ── Pass 2: S-curve + local contrast + grain + silver-blue tint ──────────
  // All operations run on the already-composited image (camera + Daguerre
  // together), so every part of the frame receives identical treatment.
  const LOCAL_CONTRAST = 0.18;
  const GRAIN_AMOUNT   = 8;

  for (let i = 0, p = 0; i < d.length; i += 4, p++) {
    // Tone-mapped luminance from LUT (S-curve + lifted blacks + gamma)
    let lum = lut[gray[p]];

    // Local contrast: add back the high-pass detail to sharpen flat areas
    lum += ((gray[p] - blurData[p * 4]) / 255) * LOCAL_CONTRAST;
    lum  = Math.max(0, Math.min(1, lum));

    // Monochrome grain applied globally so both character and background match
    lum += (Math.random() - 0.5) * GRAIN_AMOUNT / 255;
    lum  = Math.max(0, Math.min(1, lum));

    const v  = lum * 255;
    d[i]     = Math.min(255, v * 0.90 | 0); // silver tint — red slightly cool
    d[i + 1] = Math.min(255, v * 0.95 | 0); //              green neutral
    d[i + 2] = Math.min(255, v * 1.06 | 0); //              blue cast
    d[i + 3] = 255;
  }
  c.putImageData(raw, 0, 0);

  // ── Highlight bloom: screen-blend the blurred bright mask ────────────────
  c.globalCompositeOperation = 'screen';
  c.globalAlpha = 0.10;
  c.drawImage(bloomBlur, 0, 0);
  c.globalCompositeOperation = 'source-over';
  c.globalAlpha = 1;

  // ── Vignette ──────────────────────────────────────────────────────────────
  const cx   = w / 2;
  const cy   = h / 2;
  const maxR = Math.sqrt(cx * cx + cy * cy);
  const vig  = c.createRadialGradient(cx, cy, maxR * 0.25, cx, cy, maxR);
  vig.addColorStop(0,    'rgba(0,0,0,0)');
  vig.addColorStop(0.60, 'rgba(0,0,0,0.10)');
  vig.addColorStop(1,    'rgba(0,0,0,0.55)');
  c.fillStyle = vig;
  c.fillRect(0, 0, w, h);

  // ── Centre highlight glow ─────────────────────────────────────────────────
  const glow = c.createRadialGradient(cx, cy * 0.9, 0, cx, cy, maxR * 0.8);
  glow.addColorStop(0, 'rgba(210,225,255,0.05)');
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  c.fillStyle = glow;
  c.fillRect(0, 0, w, h);

  // ── Plate imperfections ───────────────────────────────────────────────────
  c.save();

  const nScratch = 4 + (Math.random() * 5 | 0);
  for (let s = 0; s < nScratch; s++) {
    const sx  = Math.random() * w;
    const sy  = Math.random() * h * 0.5;
    const ey  = sy + h * (0.15 + Math.random() * 0.55);
    const off = () => (Math.random() - 0.5);
    c.beginPath();
    c.moveTo(sx, sy);
    c.bezierCurveTo(
      sx + off() * 5, sy + (ey - sy) * 0.33,
      sx + off() * 5, sy + (ey - sy) * 0.66,
      sx + off() * 8, ey
    );
    c.strokeStyle = `rgba(255,255,255,${(0.04 + Math.random() * 0.04).toFixed(3)})`;
    c.lineWidth   = 0.4 + Math.random() * 0.7;
    c.stroke();
  }

  const nDust = 10 + (Math.random() * 12 | 0);
  for (let k = 0; k < nDust; k++) {
    c.beginPath();
    c.arc(Math.random() * w, Math.random() * h, 0.5 + Math.random() * 2.5, 0, Math.PI * 2);
    c.fillStyle = `rgba(0,0,0,${(0.04 + Math.random() * 0.04).toFixed(3)})`;
    c.fill();
  }

  c.restore();

  savedDataURL = offscreen.toDataURL('image/png');
  loadingOverlay.style.display = 'none';
  resultImg.src = savedDataURL;
  resultOverlay.style.display = 'flex';
}

function showError(msg) {
  errMsg.textContent   = msg;
  errMsg.style.display = 'block';
}

// ─── Start ────────────────────────────────────────────────────────────────────

document.getElementById('startBtn').addEventListener('click', () => {
  ARProvider.start({
    canvas: document.getElementById('camerafeed'),
    onError: (msg) => showError('Impossible de demarrer la RA : ' + msg),
  });

  startOverlay.style.display = 'none';
  arUI.style.display         = 'flex';
});
</script>
</body>
